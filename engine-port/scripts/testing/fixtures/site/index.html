<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asciicker Engine UI Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1b1f3a;
        --muted: #52606d;
        --bg: #f6f8fc;
        --card: #ffffff;
        --accent: #2457ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      }
      main {
        max-width: 860px;
        margin: 32px auto;
        padding: 0 16px 24px;
        display: grid;
        gap: 16px;
      }
      section {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid #dce3ef;
        padding: 16px;
      }
      h1,
      h2 {
        margin: 0 0 12px;
      }
      h1 {
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      label {
        font-size: 0.9rem;
      }
      input {
        border: 1px solid #c7d2e4;
        border-radius: 8px;
        padding: 8px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      #details-panel {
        display: none;
      }
      [data-state="playing"],
      [data-state="active"] {
        color: #0b7f2a;
        font-weight: 600;
      }
      .value {
        font-weight: 700;
      }
      #water-surface {
        width: 100%;
        min-height: 120px;
        border-radius: 10px;
        border: 1px solid #c9d7f0;
        background:
          repeating-linear-gradient(
            120deg,
            #8cb3ff 0,
            #8cb3ff 8px,
            #7ca5f4 8px,
            #7ca5f4 16px
          );
        background-position: 0 0;
        transition: filter 120ms linear, background-position 120ms linear;
      }
    </style>
  </head>
  <body>
    <main id="app-root">
      <section>
        <h1 id="hero-title">Asciicker Engine Browser Fixture</h1>
        <p>Project-relevant menu and water-surface selectors for screenshot-first testing.</p>
        <div class="row">
          <button id="learn-more-button">Learn more</button>
          <span id="details-panel">Visual trail active.</span>
        </div>
      </section>

      <section>
        <h2>Menu / State</h2>
        <div class="row">
          <button id="start-game-button">Start Game</button>
          <button id="pan-camera-button">Pan Camera</button>
        </div>
        <p id="game-state" data-state="menu">Menu</p>
        <p>Camera: <span class="value" id="camera-readout">x=0 y=0</span></p>
      </section>

      <section>
        <h2>Water Surface</h2>
        <div class="row">
          <button id="toggle-water-button">Toggle Water</button>
          <button id="advance-water-frame-button">Advance Water Frame</button>
        </div>
        <p id="water-status" data-state="inactive">Water inactive</p>
        <div id="water-surface" data-state="inactive" data-frame="0"></div>
      </section>
    </main>

    <script>
      const gameState = document.getElementById("game-state");
      const cameraReadout = document.getElementById("camera-readout");
      const waterStatus = document.getElementById("water-status");
      const waterSurface = document.getElementById("water-surface");
      const detailsPanel = document.getElementById("details-panel");
      let cameraX = 0;
      let cameraY = 0;

      document.getElementById("learn-more-button").addEventListener("click", () => {
        detailsPanel.style.display = "inline";
      });

      document.getElementById("start-game-button").addEventListener("click", () => {
        gameState.dataset.state = "playing";
        gameState.textContent = "Playing";
      });

      document.getElementById("pan-camera-button").addEventListener("click", () => {
        cameraX += 4;
        cameraY += 2;
        cameraReadout.textContent = `x=${cameraX} y=${cameraY}`;
      });

      document.getElementById("toggle-water-button").addEventListener("click", () => {
        if (waterSurface.dataset.state === "active") {
          waterSurface.dataset.state = "inactive";
          waterStatus.dataset.state = "inactive";
          waterStatus.textContent = "Water inactive";
          waterSurface.style.filter = "none";
          return;
        }
        waterSurface.dataset.state = "active";
        waterStatus.dataset.state = "active";
        waterStatus.textContent = "Water active";
      });

      document.getElementById("advance-water-frame-button").addEventListener("click", () => {
        const frame = Number.parseInt(waterSurface.dataset.frame || "0", 10) + 1;
        waterSurface.dataset.frame = String(frame);
        waterSurface.style.backgroundPosition = `${frame * 6}px ${frame * 3}px`;
        waterSurface.style.filter = `hue-rotate(${frame * 11}deg) brightness(${1 + (frame % 3) * 0.04})`;
        if (waterSurface.dataset.state === "active") {
          waterStatus.textContent = `Water active, frame ${frame}`;
        }
      });
    </script>
  </body>
</html>
